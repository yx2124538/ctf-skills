---
name: Skill Security Audit

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: security-audit-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-skills:
    name: Detect skills to audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      skills: ${{ steps.list.outputs.skills }}
      has_skills: ${{ steps.list.outputs.has_skills }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find skills to audit
        id: list
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SKILL_FILES=$(find . -name SKILL.md -not -path './.git/*' | sort)
            LABEL="All skills"
          else
            if [ "$EVENT_NAME" = "pull_request" ]; then
              CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD 2>/dev/null || echo "")
            else
              BEFORE="$PUSH_BEFORE"
              if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
                CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD 2>/dev/null || echo "")
              else
                CHANGED=$(git diff --name-only "$BEFORE"...HEAD 2>/dev/null || echo "")
              fi
            fi

            SKILL_FILES=""
            while IFS= read -r file; do
              dir=$(echo "$file" | cut -d'/' -f1)
              case "$dir" in
                ""|.github|.claude|.codex|.gemini|scripts|docs) continue ;;
              esac
              if [ -f "$dir/SKILL.md" ]; then
                SKILL_FILES+="./$dir/SKILL.md"$'\n'
              fi
            done <<< "$CHANGED"

            LABEL="Changed skills"
          fi

          SKILL_FILES=$(printf '%s' "$SKILL_FILES" | sed '/^$/d' | sort -u)

          if [ -z "$SKILL_FILES" ]; then
            echo "skills=[]" >> "$GITHUB_OUTPUT"
            echo "has_skills=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SKILLS=()
          while IFS= read -r file; do
            dir=${file#./}
            dir=${dir%/SKILL.md}
            [ -n "$dir" ] && SKILLS+=("$dir")
          done <<< "$SKILL_FILES"

          JSON=$(printf '%s\n' "${SKILLS[@]}" | python3 -c 'import json, sys; print(json.dumps([line.rstrip("\n") for line in sys.stdin if line.rstrip("\n")]))')

          echo "skills=$JSON" >> "$GITHUB_OUTPUT"
          echo "has_skills=true" >> "$GITHUB_OUTPUT"
          echo "$LABEL: $JSON"

  audit:
    name: Security audit
    needs: detect-skills
    if: needs.detect-skills.outputs.has_skills == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run security auditor
        id: audit
        env:
          SKILLS: ${{ needs.detect-skills.outputs.skills }}
        run: |
          AUDITOR="scripts/skill_security_auditor.py"
          REPORT_FILE=$(mktemp)
          OVERALL_EXIT=0

          echo "## 🔒 Skill Security Audit Results" > "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"

          # Parse JSON array of skill dirs safely, one directory per line
          while IFS= read -r skill_dir; do
            [ -z "$skill_dir" ] && continue
            echo "::group::Auditing $skill_dir"
            echo "Scanning: $skill_dir"

            JSON_STDOUT=$(mktemp)
            JSON_STDERR=$(mktemp)

            # Run auditor in strict mode with JSON output
            if python3 "$AUDITOR" "$skill_dir" --strict --json >"$JSON_STDOUT" 2>"$JSON_STDERR"; then
              EXIT_CODE=0
            else
              EXIT_CODE=$?
            fi

            JSON_OUT=$(cat "$JSON_STDOUT")
            STDERR_OUT=$(cat "$JSON_STDERR")

            if [ -n "$STDERR_OUT" ]; then
              echo "$STDERR_OUT" >&2
            fi

            # Try to parse JSON output
            VERDICT=$(echo "$JSON_OUT" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              v = d.get('verdict', 'UNKNOWN')
              c = d.get('summary', {}).get('critical', 0)
              h = d.get('summary', {}).get('high', 0)
              i = d.get('summary', {}).get('info', 0)
              t = d.get('summary', {}).get('total', 0)
              print(f'{v}|{c}|{h}|{i}|{t}')
          except:
              print('ERROR|0|0|0|0')
          " 2>/dev/null || echo "ERROR|0|0|0|0")

            IFS='|' read -r V CRIT HIGH INFO TOTAL <<< "$VERDICT"

            if [ "$V" = "ERROR" ]; then
              echo "::error::Auditor did not return valid JSON for $skill_dir"
              [ -n "$STDERR_OUT" ] && echo "::error::$STDERR_OUT"
              OVERALL_EXIT=1
            fi

            # Map verdict to emoji
            case "$V" in
              PASS) ICON="✅" ;;
              WARN) ICON="⚠️" ;;
              FAIL) ICON="❌"; OVERALL_EXIT=1 ;;
              *)    ICON="❓"; OVERALL_EXIT=1 ;;
            esac

            echo "### $ICON \`$skill_dir\` — $V" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"

            if [ "$TOTAL" -gt 0 ]; then
              echo "| Severity | Count |" >> "$REPORT_FILE"
              echo "|----------|-------|" >> "$REPORT_FILE"
              [ "$CRIT" -gt 0 ] && echo "| 🔴 Critical | $CRIT |" >> "$REPORT_FILE"
              [ "$HIGH" -gt 0 ] && echo "| 🟡 High | $HIGH |" >> "$REPORT_FILE"
              [ "$INFO" -gt 0 ] && echo "| ⚪ Info | $INFO |" >> "$REPORT_FILE"
              echo "" >> "$REPORT_FILE"

              # Include finding details for WARN/FAIL
              if [ "$V" != "PASS" ]; then
                echo "<details><summary>Findings detail</summary>" >> "$REPORT_FILE"
                echo "" >> "$REPORT_FILE"
                echo '```json' >> "$REPORT_FILE"
                echo "$JSON_OUT" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              findings = d.get('findings', [])
              for f in findings:
                  if f.get('severity') in ('CRITICAL', 'HIGH'):
                      print(json.dumps(f, indent=2))
          except:
              pass
          " >> "$REPORT_FILE"
                echo '```' >> "$REPORT_FILE"
                echo "</details>" >> "$REPORT_FILE"
                echo "" >> "$REPORT_FILE"
              fi
            else
              echo "No findings." >> "$REPORT_FILE"
              echo "" >> "$REPORT_FILE"
            fi

            echo "::endgroup::"
          done < <(echo "$SKILLS" | python3 -c "import sys, json; [print(s) for s in json.load(sys.stdin)]")

          # Save report for comment step
          echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"
          echo "exit_code=$OVERALL_EXIT" >> "$GITHUB_OUTPUT"

      - name: Post audit results as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportFile = '${{ steps.audit.outputs.report_file }}';
            let body = '## 🔒 Skill Security Audit\n\nNo report generated.';
            try {
              body = fs.readFileSync(reportFile, 'utf8');
            } catch (e) {
              console.log('Could not read report file:', e.message);
            }

            // Find and update existing comment or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## 🔒 Skill Security Audit';
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail on critical findings
        if: steps.audit.outputs.exit_code == '1'
        run: |
          echo "::error::Security audit found CRITICAL findings."
          exit 1
